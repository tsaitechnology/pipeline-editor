name: Deploy Docs and Playground to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Project Pages live under /<repo>/ — must match `<base href>` for routing/assets.
  BASE_HREF: /pipeline-editor/
  DOCS_BASE_HREF: /pipeline-editor/docs/
  NX_NO_CLOUD: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Build playground
        run: npx nx build playground --base-href="$BASE_HREF"

      - name: Build docs
        run: npx nx build docs --base-href="$DOCS_BASE_HREF"

      - name: Compose Pages artifact
        # Keep the playground at /pipeline-editor/ and publish docs at
        # /pipeline-editor/docs/. GitHub Pages serves 404.html for unknown
        # playground paths; the Angular router then takes over for /board.
        run: |
          rm -rf dist/pages
          mkdir -p dist/pages
          cp -R dist/apps/playground/browser/. dist/pages/
          mkdir -p dist/pages/docs
          cp -R dist/apps/docs/browser/. dist/pages/docs/
          cp dist/pages/index.html dist/pages/404.html
          touch dist/pages/.nojekyll

      # `enablement: true` turns Pages on via the API (if the repo allows it), so
      # no manual "Settings → Pages" step is needed on first run.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
